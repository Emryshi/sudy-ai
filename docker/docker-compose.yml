version: '3.8'

services:
  sudy-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../checkpoints:/app/checkpoints
      - ../data:/app/data
    environment:
      - MODEL_PATH=/app/checkpoints/sudy-sft
      - TOKENIZER_PATH=/app/checkpoints/sudy-tokenizer
      - PORT=8000
      - HOST=0.0.0.0
    restart: always
    # GPU support (requires NVIDIA Container Toolkit installed on host)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
